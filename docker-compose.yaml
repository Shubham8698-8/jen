version: '3.8'
services:
  web:
    container_name: webapp
    build: .
    ports:
      - "8080:80"
    environment:
      DB_HOST: mysql
      DB_USER: shubzz
      DB_PASS: root
      DB_NAME: devops
    depends_on:
      - mysql
  mysql:
    container_name: mysql
    image: mysql:8
    environment: 
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: devops
      MYSQL_USER: shubzz
      MYSQL_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
volumes: 
  mysql_data:
